name: Build libdatachannel

# This workflow builds libdatachannel with OpenSSL for all platforms.
# It is configured to run ONLY on manual trigger (workflow_dispatch).
# The pre-built libraries are committed to the repo, so this workflow
# only needs to run when updating libdatachannel or OpenSSL versions.
#
# To manually trigger:
#   1. Go to Actions tab in GitHub
#   2. Select "Build libdatachannel" workflow
#   3. Click "Run workflow"
#   4. Download artifacts and commit to plugins/unreal/Open3DStream/ThirdParty/webrtc/
on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build libdatachannel - WebRTC (Windows)
    runs-on: self-hosted  # Use same runner as Unreal plugin CI to ensure toolchain compatibility
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install Python dependencies
        run: pip install jsonschema jinja2

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install OpenSSL
        run: |
          choco install openssl -y --no-progress
          Write-Host "OpenSSL installed successfully"
          # Verify OpenSSL installation
          $opensslPath = "C:\Program Files\OpenSSL-Win64"
          if (Test-Path $opensslPath) {
            Write-Host "OpenSSL found at: $opensslPath"
            Get-ChildItem "$opensslPath\bin" -Filter "*.dll" | Select-Object -First 5
          }
        shell: powershell

      - name: Build libdatachannel
        working-directory: thirdparty/libdatachannel
        run: |
          # OpenSSL is the default TLS backend, so we explicitly disable other backends
          cmake -S . -B build `
            -DBUILD_SHARED_LIBS=OFF `
            -DNO_MEDIA=ON `
            -DNO_WEBSOCKET=ON `
            -DUSE_GNUTLS=OFF `
            -DUSE_MBEDTLS=OFF `
            -DNO_EXAMPLES=ON `
            -DNO_TESTS=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build --config Release
          Write-Host "Checking built libraries..."
          Get-ChildItem -Path "build" -Recurse -Filter "*.lib" | Select-Object FullName
          Get-ChildItem -Path "build/deps" -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object FullName
          Get-ChildItem -Path "build/Release" -ErrorAction SilentlyContinue | Select-Object Name
          cmake --install build --config Release
          # Also copy dependency libraries (juice, usrsctp) from build/deps
          Write-Host "Copying dependency libraries from build/deps..."
          Get-ChildItem -Path "build/deps" -Recurse -Filter "*.lib" | ForEach-Object { 
            Copy-Item $_.FullName "${{ github.workspace }}/install/lib/" -Force
            Write-Host "  Copied $($_.Name)"
          }
        shell: powershell

      - name: Package artifacts
        run: |
          mkdir -p artifacts/windows/include
          mkdir -p artifacts/windows/lib
          Copy-Item -Recurse "${{ github.workspace }}/install/include/rtc" artifacts/windows/include/
          # Copy all static libraries (datachannel and its dependencies)
          Copy-Item "${{ github.workspace }}/install/lib/datachannel.lib" artifacts/windows/lib/
          Copy-Item "${{ github.workspace }}/install/lib/usrsctp.lib" artifacts/windows/lib/ -ErrorAction SilentlyContinue
          Copy-Item "${{ github.workspace }}/install/lib/juice-static.lib" artifacts/windows/lib/ -ErrorAction SilentlyContinue
          Copy-Item "${{ github.workspace }}/install/lib/juice.lib" artifacts/windows/lib/ -ErrorAction SilentlyContinue
          # Copy OpenSSL libraries
          # Note: OpenSSL libraries are typically found in the system installation
          # libdatachannel will link against system OpenSSL, so we need to ensure the libs are available
          $opensslBase = "C:\Program Files\OpenSSL-Win64"
          if (Test-Path "$opensslBase\lib\libssl.lib") {
            Copy-Item "$opensslBase\lib\libssl.lib" artifacts/windows/lib/ -ErrorAction SilentlyContinue
            Copy-Item "$opensslBase\lib\libcrypto.lib" artifacts/windows/lib/ -ErrorAction SilentlyContinue
          }
          # List what was collected
          Write-Host "Collected libraries:"
          Get-ChildItem artifacts/windows/lib/*.lib | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB, 1))MB)" }
        shell: powershell

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libdatachannel-windows
          path: artifacts/windows

  build-linux:
    name: Build libdatachannel - WebRTC (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install Python dependencies
        run: pip install jsonschema jinja2

      - name: Install build tools and OpenSSL
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          # Verify OpenSSL installation
          pkg-config --exists openssl && echo "OpenSSL found" || echo "OpenSSL not found"
          pkg-config --modversion openssl

      - name: Build libdatachannel
        working-directory: thirdparty/libdatachannel
        run: |
          # OpenSSL is the default TLS backend, so we explicitly disable other backends
          cmake -S . -B build -G Ninja \
            -DBUILD_SHARED_LIBS=OFF \
            -DNO_WEBSOCKET=ON \
            -DUSE_GNUTLS=OFF \
            -DUSE_MBEDTLS=OFF \
            -DNO_EXAMPLES=ON \
            -DNO_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build
          echo "Checking built libraries..."
          find build -name "*.a" -type f
          cmake --install build
          # Also copy dependency libraries (juice, usrsctp) from build/deps
          echo "Copying dependency libraries from build/deps..."
          find build/deps -name "*.a" -type f -exec cp -v {} ${{ github.workspace }}/install/lib/ \;

      - name: Package artifacts
        run: |
          mkdir -p artifacts/linux/include
          mkdir -p artifacts/linux/lib
          cp -r ${{ github.workspace }}/install/include/rtc artifacts/linux/include/
          # Copy all static libraries (datachannel and its dependencies)
          cp ${{ github.workspace }}/install/lib/libdatachannel.a artifacts/linux/lib/
          cp ${{ github.workspace }}/install/lib/libusrsctp.a artifacts/linux/lib/ 2>/dev/null || true
          cp ${{ github.workspace }}/install/lib/libjuice-static.a artifacts/linux/lib/ 2>/dev/null || true
          cp ${{ github.workspace }}/install/lib/libjuice.a artifacts/linux/lib/ 2>/dev/null || true
          # Copy OpenSSL libraries from system installation
          # Note: On Linux, we typically link against system OpenSSL dynamically
          # but for static builds, we may need the static libraries
          cp /usr/lib/x86_64-linux-gnu/libssl.a artifacts/linux/lib/ 2>/dev/null || true
          cp /usr/lib/x86_64-linux-gnu/libcrypto.a artifacts/linux/lib/ 2>/dev/null || true
          # List what was collected
          echo "Collected libraries:"
          ls -lh artifacts/linux/lib/*.a | awk '{print "  " $9 " (" $5 ")"}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libdatachannel-linux
          path: artifacts/linux

  build-macos:
    name: Build libdatachannel (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install Python dependencies
        run: pip install jsonschema jinja2

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install OpenSSL
        run: |
          brew install openssl
          # Verify OpenSSL installation
          brew list openssl
          echo "OpenSSL installed at: $(brew --prefix openssl)"
          # Set OPENSSL_ROOT_DIR for CMake to find it
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV

      - name: Build libdatachannel
        working-directory: thirdparty/libdatachannel
        run: |
          # OpenSSL is the default TLS backend, so we explicitly disable other backends
          cmake -S . -B build \
            -DBUILD_SHARED_LIBS=OFF \
            -DNO_MEDIA=ON \
            -DNO_WEBSOCKET=ON \
            -DUSE_GNUTLS=OFF \
            -DUSE_MBEDTLS=OFF \
            -DNO_EXAMPLES=ON \
            -DNO_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build
          echo "Checking built libraries..."
          find build -name "*.a" -type f
          cmake --install build

      - name: Package artifacts
        run: |
          mkdir -p artifacts/macos/include
          mkdir -p artifacts/macos/lib
          cp -r ${{ github.workspace }}/install/include/rtc artifacts/macos/include/
          # Copy all static libraries (datachannel and its dependencies)
          cp ${{ github.workspace }}/install/lib/libdatachannel.a artifacts/macos/lib/
          cp ${{ github.workspace }}/install/lib/libusrsctp.a artifacts/macos/lib/ 2>/dev/null || true
          cp ${{ github.workspace }}/install/lib/libjuice-static.a artifacts/macos/lib/ 2>/dev/null || true
          # Copy OpenSSL libraries from Homebrew installation
          # Note: macOS may link against system OpenSSL dynamically
          cp $OPENSSL_ROOT_DIR/lib/libssl.a artifacts/macos/lib/ 2>/dev/null || true
          cp $OPENSSL_ROOT_DIR/lib/libcrypto.a artifacts/macos/lib/ 2>/dev/null || true
          # List what was collected
          echo "Collected libraries:"
          ls -lh artifacts/macos/lib/*.a | awk '{print "  " $9 " (" $5 ")"}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libdatachannel-macos
          path: artifacts/macos
