name: Build O3DS core

# This workflow builds O3DS core as prebuilt static libraries for all platforms.
# It is configured to run ONLY on manual trigger (workflow_dispatch).
# The pre-built libraries should be committed to the repo, so this workflow
# only needs to run when updating O3DS core source or version.
#
# To manually trigger:
#   1. Go to Actions tab in GitHub
#   2. Select "Build O3DS core" workflow
#   3. Click "Run workflow"
#   4. Download artifacts and commit to plugins/unreal/Open3DStream/ThirdParty/o3ds/
on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build O3DS core (Windows)
    runs-on: self-hosted  # Use same runner as Unreal plugin CI to ensure toolchain compatibility
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Get version tag
        id: version
        run: |
          $version = git describe --tags --always --dirty 2>$null
          if (-not $version) { $version = "1.0.4" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Build O3DS core (Release)
        working-directory: Build/o3ds-core
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DO3DS_VERSION_TAG="${{ steps.version.outputs.version }}" `
            -DO3DS_WITH_WEBSOCKET=OFF `
            -DO3DS_WITH_WEBRTC=OFF `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build --config Release --parallel
          cmake --install build --config Release
          Write-Host "Checking built library..."
          Get-ChildItem -Path "build/Release" -Filter "*.lib" | Select-Object FullName

      - name: Package artifacts
        run: |
          mkdir -p artifacts/windows/include
          mkdir -p artifacts/windows/lib/Win64/Release
          # Copy headers
          Copy-Item -Recurse "${{ github.workspace }}/install/include/o3ds" artifacts/windows/include/
          Copy-Item "${{ github.workspace }}/install/include/o3ds_generated.h" artifacts/windows/include/
          # Copy library
          Copy-Item "Build/o3ds-core/build/Release/o3ds.lib" artifacts/windows/lib/Win64/Release/
          # List what was collected
          Write-Host "Collected artifacts:"
          Get-ChildItem artifacts/windows/lib/Win64/Release/*.lib | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1KB, 1))KB)" }
          Get-ChildItem artifacts/windows/include -Recurse -Filter "*.h" | Measure-Object | ForEach-Object { Write-Host "  $($_.Count) header files" }
        shell: powershell

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: o3ds-core-windows
          path: artifacts/windows

  build-linux:
    name: Build O3DS core (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Get version tag
        id: version
        run: |
          version=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.4")
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Build O3DS core (Release)
        working-directory: Build/o3ds-core
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DO3DS_VERSION_TAG="${{ steps.version.outputs.version }}" \
            -DO3DS_WITH_WEBSOCKET=OFF \
            -DO3DS_WITH_WEBRTC=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build --parallel
          cmake --install build
          echo "Checking built library..."
          find build -name "*.a" -type f

      - name: Package artifacts
        run: |
          mkdir -p artifacts/linux/include
          mkdir -p artifacts/linux/lib/Linux/Release
          # Copy headers
          cp -r ${{ github.workspace }}/install/include/o3ds artifacts/linux/include/
          cp ${{ github.workspace }}/install/include/o3ds_generated.h artifacts/linux/include/
          # Copy library
          cp Build/o3ds-core/build/libo3ds.a artifacts/linux/lib/Linux/Release/
          # List what was collected
          echo "Collected artifacts:"
          ls -lh artifacts/linux/lib/Linux/Release/*.a | awk '{print "  " $9 " (" $5 ")"}'
          echo "  $(find artifacts/linux/include -name "*.h" | wc -l) header files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: o3ds-core-linux
          path: artifacts/linux

  build-macos:
    name: Build O3DS core (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Get version tag
        id: version
        run: |
          version=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.4")
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Build O3DS core (Release)
        working-directory: Build/o3ds-core
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DO3DS_VERSION_TAG="${{ steps.version.outputs.version }}" \
            -DO3DS_WITH_WEBSOCKET=OFF \
            -DO3DS_WITH_WEBRTC=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          cmake --build build --parallel
          cmake --install build
          echo "Checking built library..."
          find build -name "*.a" -type f

      - name: Package artifacts
        run: |
          mkdir -p artifacts/macos/include
          mkdir -p artifacts/macos/lib/Mac/Release
          # Copy headers
          cp -r ${{ github.workspace }}/install/include/o3ds artifacts/macos/include/
          cp ${{ github.workspace }}/install/include/o3ds_generated.h artifacts/macos/include/
          # Copy library
          cp Build/o3ds-core/build/libo3ds.a artifacts/macos/lib/Mac/Release/
          # List what was collected
          echo "Collected artifacts:"
          ls -lh artifacts/macos/lib/Mac/Release/*.a | awk '{print "  " $9 " (" $5 ")"}'
          echo "  $(find artifacts/macos/include -name "*.h" | wc -l) header files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: o3ds-core-macos
          path: artifacts/macos
