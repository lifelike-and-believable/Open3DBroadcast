name: Unreal Plugin Nightly

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: unreal-plugin-nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  UE_ROOT: 'C:\Program Files\Epic Games\UE_5.4'
  PLUGIN_NAME: 'Open3DStream'

jobs:
  nightly-build:
    runs-on: [ self-hosted, ue5, windows ]

    steps:
      - name: Checkout (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Link plugin into Sandbox
        shell: powershell
        run: |
          & .\Build\Scripts\Link-PluginIntoSandbox.ps1

      - name: Setup UE
        shell: powershell
        run: |
          & .\Build\Scripts\Setup-UE.ps1 -UEPath "$env:UE_ROOT"

      - name: Locate plugin (.uplugin)
        id: find
        shell: powershell
        run: |
          $pluginDir = Join-Path $PWD "plugins\unreal\$env:PLUGIN_NAME"
          $upluginPath = Join-Path $pluginDir "$env:PLUGIN_NAME.uplugin"
          
          if (!(Test-Path -LiteralPath $upluginPath)) {
            Write-Error "Plugin file not found at: $upluginPath"
            exit 1
          }
          
          "plugin_path=$upluginPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_dir=$pluginDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_name=$env:PLUGIN_NAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "✓ Using plugin: $upluginPath"

      - name: Build plugin (Win64)
        shell: powershell
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
          & .\Build\Scripts\Build-Plugin.ps1 `
            -UEPath "$env:UE_ROOT" `
            -PluginUPluginPath "${{ steps.find.outputs.plugin_path }}" `
            -OutDir "$pkg" `
            -TargetPlatforms @("Win64")

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.plugin_name }}-Nightly-Win64-${{ github.sha }}
          path: ${{ runner.temp }}/PluginPackage
          retention-days: 14  # Keep nightly builds for 2 weeks

      # Optional: Run comprehensive tests during nightly builds
      # Uncomment to enable
      
      # - name: Run Automation Tests
      #   shell: powershell
      #   timeout-minutes: 120
      #   run: |
      #     & .\Build\Scripts\Run-AutomationTests.ps1 `
      #       -UEPath "$env:UE_ROOT" `
      #       -ProjectFile "$PWD\ProjectSandbox\ProjectSandbox.uproject" `
      #       -TestFilter "${{ steps.find.outputs.plugin_name }}.*" `
      #       -ResultsDir "$PWD\Artifacts\NightlyTests"

      # - name: Upload test results
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: Nightly-TestResults-${{ github.sha }}
      #     path: Artifacts/NightlyTests
      #     if-no-files-found: ignore
      #     retention-days: 14

      # Optional: Run Gauntlet tests for extensive integration testing
      
      # - name: Run Gauntlet Tests
      #   shell: powershell
      #   run: |
      #     & .\Build\Scripts\Run-Gauntlet.ps1 `
      #       -UEPath "$env:UE_ROOT" `
      #       -ProjectFile "$PWD\ProjectSandbox\ProjectSandbox.uproject" `
      #       -GauntletConfigs @("Open3DStreamTests") `
      #       -OutputDir "$PWD\Artifacts\Gauntlet" `
      #       -NullRHI

      # - name: Upload Gauntlet results
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: Gauntlet-Results-${{ github.sha }}
      #     path: Artifacts/Gauntlet
      #     if-no-files-found: ignore
      #     retention-days: 14

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // You could send notifications here (e.g., to Slack, Discord, email)
            // or create an issue
            console.log(`❌ Nightly build failed. See: ${runUrl}`);
