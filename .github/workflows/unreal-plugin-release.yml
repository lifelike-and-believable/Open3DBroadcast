name: Unreal Plugin Release

on:
  push:
    tags:
      - "plugin-v*.*.*"  # Separate versioning for plugin releases
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., plugin-v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  checks: write

concurrency:
  group: unreal-plugin-release-${{ github.ref }}
  cancel-in-progress: true

env:
  UE_ROOT: 'C:\Program Files\Epic Games\UE_5.6'
  PLUGIN_NAME: 'Open3DStream'

jobs:
  build-release:
    runs-on: [ self-hosted, ue5, windows ]

    steps:
      - name: Build plugin core (composite)
        id: core
        uses: ./.github/actions/build-plugin-core
        with:
          ue_root: ${{ env.UE_ROOT }}
          plugin_name: ${{ env.PLUGIN_NAME }}
          build_type: Release
          enable_webrtc: true
          libdatachannel_root: ${{ github.workspace }}\plugins\unreal\${{ env.PLUGIN_NAME }}\ThirdParty\webrtc

      - name: Get version
        id: version
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version_tag }}"
          } else {
            $version = "${{ github.ref_name }}"
          }
          $versionWithoutPrefix = $version -replace '^plugin-v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version_number=$versionWithoutPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"
          Write-Host "Version number: $versionWithoutPrefix"

      - name: Verify WebRTC libraries (prebuilt)
        shell: powershell
        run: |
          $pluginLib = "plugins\unreal\$env:PLUGIN_NAME\ThirdParty"
          $webrtcLibs = @(
            "$pluginLib\webrtc\datachannel.lib",
            "$pluginLib\webrtc\juice.lib",
            "$pluginLib\webrtc\usrsctp.lib",
            "$pluginLib\webrtc\mbedtls.lib",
            "$pluginLib\webrtc\mbedx509.lib",
            "$pluginLib\webrtc\mbedcrypto.lib"
          )
          $missing = @()
          foreach ($lib in $webrtcLibs) { if (!(Test-Path $lib)) { $missing += $lib } }
          if ($missing.Count -gt 0) {
            Write-Error "Missing WebRTC libraries (required for release build):"
            $missing | ForEach-Object { Write-Error "  - $_" }
            Write-Error "Provide these via the prebuilt artifact process or commit them under plugins/unreal/$env:PLUGIN_NAME/ThirdParty/webrtc. Run the build-libdatachannel helper if needed."
            exit 1
          } else { Write-Host "[OK] All WebRTC libraries present" }

      - name: Verify O3DS core libraries (prebuilt)
        shell: powershell
        run: |
          $pluginLib = "plugins\unreal\$env:PLUGIN_NAME\ThirdParty"
          $o3dsLibs = @(
            "$pluginLib\o3ds\lib\Win64\Release\o3ds.lib"
          )
          $missing = @()
          foreach ($lib in $o3dsLibs) { if (!(Test-Path $lib)) { $missing += $lib } }
          if ($missing.Count -gt 0) {
            Write-Error "Missing O3DS core libraries (required for release build):"
            $missing | ForEach-Object { Write-Error "  - $_" }
            Write-Error "Provide these via the prebuilt artifact process. Run the build-o3ds-core workflow to generate them."
            exit 1
          } else { Write-Host "[OK] All O3DS core libraries present" }

      - name: Locate plugin (.uplugin)
        id: find
        shell: powershell
        run: |
          $pluginDir = Join-Path $PWD "plugins\unreal\$env:PLUGIN_NAME"
          $upluginPath = Join-Path $pluginDir "$env:PLUGIN_NAME.uplugin"
          if (!(Test-Path -LiteralPath $upluginPath)) { Write-Error "Plugin file not found at: $upluginPath"; exit 1 }
          "plugin_path=$upluginPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_dir=$pluginDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "plugin_name=$env:PLUGIN_NAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "[OK] Using plugin: $upluginPath"

      - name: Update plugin versions
        shell: powershell
        run: |
          $versionNumber = "${{ steps.version.outputs.version_number }}"
          
          # Update Open3DStream plugin version
          $upluginPath = "${{ steps.find.outputs.plugin_path }}"
          $content = Get-Content -Path $upluginPath -Raw | ConvertFrom-Json
          $content.VersionName = $versionNumber
          if ($content.Version) {
            $content.Version = [int]$content.Version + 1
          }
          $content | ConvertTo-Json -Depth 10 | Set-Content -Path $upluginPath -Encoding UTF8
          Write-Host "[OK] Updated Open3DStream plugin version to $versionNumber"
          
          # Open3DBroadcast is now integrated as a module within Open3DStream plugin
          # Version is automatically updated with the main plugin

      - name: Build Open3DStream plugin (Win64, Shipping)
        shell: powershell
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
          Write-Host "Building ${{ steps.find.outputs.plugin_name }} ${{ steps.version.outputs.version_number }} for Win64 (Shipping)..."
          & .\Build\Scripts\Build-Plugin.ps1 `
            -UEPath "$env:UE_ROOT" `
            -PluginUPluginPath "${{ steps.find.outputs.plugin_path }}" `
            -OutDir "$pkg" `
            -TargetPlatforms @("Win64") `
            -Configuration "Shipping"

      # Ensure ThirdParty libraries are bundled into the packaged plugin (for redistribution/rebuilds)
      - name: Bundle ThirdParty into packaged plugin
        shell: powershell
        run: |
          $pkgRoot = Join-Path $env:RUNNER_TEMP 'PluginPackage'
          $pluginName = "${{ steps.find.outputs.plugin_name }}"
          $srcThirdParty = Join-Path "${{ steps.find.outputs.plugin_dir }}" 'ThirdParty'

          if (!(Test-Path $srcThirdParty)) {
            Write-Warning "Source ThirdParty not found at: $srcThirdParty. Skipping copy."
            exit 0
          }

          # Try to detect the packaged plugin directory (usually PluginPackage\Open3DStream)
          $candidate = Join-Path $pkgRoot $pluginName
          if (Test-Path $candidate) {
            $dstPluginDir = $candidate
          } else {
            # Fallback: if UAT didn't create a plugin-named subfolder, use the root
            $dstPluginDir = $pkgRoot
          }

          $dstThirdParty = Join-Path $dstPluginDir 'ThirdParty'
          Write-Host "Copying ThirdParty from $srcThirdParty to $dstThirdParty ..."
          New-Item -ItemType Directory -Force -Path $dstThirdParty | Out-Null

          # Use robocopy to preserve structure; suppress verbose logs
          $rc = Start-Process -FilePath robocopy -ArgumentList @('"'+$srcThirdParty+'"','"'+$dstThirdParty+'"','/E','/NFL','/NDL','/NJH','/NJS','/NC','/NS') -Wait -PassThru
          if ($rc.ExitCode -ge 8) {
            Write-Error "Robocopy failed with exit code $($rc.ExitCode)"
            exit 1
          }

          # Sanity check that critical libs made it into the package
          $expected = @(
            Join-Path $dstThirdParty 'webrtc\datachannel.lib'),
            Join-Path $dstThirdParty 'webrtc\juice.lib'),
            Join-Path $dstThirdParty 'webrtc\usrsctp.lib'),
            Join-Path $dstThirdParty 'o3ds\lib\Win64\Release\o3ds.lib'
          )
          $missing = @()
          foreach ($p in $expected) { if (!(Test-Path $p)) { $missing += $p } }
          if ($missing.Count -gt 0) {
            Write-Warning "ThirdParty copy completed, but some expected libs are missing in the packaged output:"
            $missing | ForEach-Object { Write-Warning "  - $_" }
          } else {
            Write-Host "[OK] ThirdParty libraries bundled into packaged plugin"
          }

      # Open3DBroadcast is now integrated as a module within Open3DStream plugin
      # No separate build step needed - it's built as part of Open3DStream

      # Optional: Build for additional platforms
      # - name: Build plugin (Linux, Shipping)
      #   shell: powershell
      #   run: |
      #     $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
      #     & .\Build\Scripts\Build-Plugin.ps1 `
      #       -UEPath "$env:UE_ROOT" `
      #       -PluginUPluginPath "${{ steps.find.outputs.plugin_path }}" `
      #       -OutDir "$pkg" `
      #       -TargetPlatforms @("Linux") `
      #       -Configuration "Shipping"

      - name: Restructure for archive
        shell: powershell
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
          $restructured = Join-Path $env:RUNNER_TEMP 'PluginArchive'
          
          # Determine UE version from UE_ROOT
          $ueVersionMatch = [regex]::Match("$env:UE_ROOT", "UE_(\d+\.\d+)")
          if ($ueVersionMatch.Success) {
            $ueVersion = $ueVersionMatch.Groups[1].Value
          } else {
            # Fallback: try to extract from path differently
            $ueVersion = "5.6"  # Default fallback
          }
          
          $targetPath = Join-Path $restructured "UE_$ueVersion\Plugins\$env:PLUGIN_NAME"
          
          Write-Host "Restructuring plugins for archive..."
          Write-Host "  Source: $pkg"
          Write-Host "  Target: $targetPath"
          Write-Host "  UE Version: $ueVersion"
          
          # Create target directory structure
          New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
          
          # Copy plugin to new structure with proper plugin name subdirectory
          Copy-Item -Path "$pkg\*" -Destination $targetPath -Recurse -Force
          
          Write-Host "[OK] Plugin restructured to UE_$ueVersion/Plugins/$env:PLUGIN_NAME/"

      - name: Create archive
        shell: powershell
        run: |
          $restructured = Join-Path $env:RUNNER_TEMP 'PluginArchive'
          $archiveName = "Open3DStream-Plugins-${{ steps.version.outputs.version_number }}-Win64.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          
          Compress-Archive -Path "$restructured\*" -DestinationPath $archivePath -CompressionLevel Optimal
          
          "archive_path=$archivePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "archive_name=$archiveName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "[OK] Created archive: $archiveName"
        id: archive

      - name: Generate release notes
        id: release_notes
        shell: powershell
        run: |
          $notes = @"
          ## Open3DStream Plugins ${{ steps.version.outputs.version }}

          ### Installation

          This package contains the Open3DStream plugin with receiver and broadcasting capabilities:

          1. Download and extract the plugin package
          2. Copy the `UE_X.X` folder that matches your Unreal Engine version to your project root
             - The archive contains `UE_X.X/Plugins/Open3DStream/` with all functionality included
             - This will add to your project's `Plugins` directory
          3. Alternatively, extract the inner plugin folder directly to your project's `Plugins` directory
          4. Restart Unreal Editor
          5. Enable the plugin in the Plugins browser (Edit → Plugins → Search "Open3DStream")

          ### Compatibility

          - **Unreal Engine**: 5.4+ (built with 5.6)
          - **Platform**: Windows (Win64)

          ### Features

          This release includes:
          - **Open3DStream Plugin**: Complete animation streaming solution
            - **Receiver**: LiveLink source for receiving animation data from external sources
            - **Broadcaster**: Send skeletal mesh pose and curve data to remote clients

          ### Changes

          See the [full changelog](https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.version }}...develop) for details.
          "@
          
          $notes | Out-File -FilePath "$env:RUNNER_TEMP\release_notes.md" -Encoding UTF8
          Write-Host "[OK] Generated release notes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Open3DStream Plugin ${{ steps.version.outputs.version }}
          body_path: ${{ runner.temp }}/release_notes.md
          files: ${{ steps.archive.outputs.archive_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnrealPlugins-Release-${{ steps.version.outputs.version_number }}
          path: ${{ runner.temp }}/PluginPackage
          retention-days: 90  # Keep releases longer
