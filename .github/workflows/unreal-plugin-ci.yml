name: Unreal Plugin CI

on:
  pull_request:
    branches: [ develop, main ]
    types: [ opened, synchronize, ready_for_review ]
  push:
    branches: [ develop, main ]
  workflow_dispatch:
    inputs:
      open_editor:
        description: "Open Unreal Editor after build (Windows self-hosted)"
        required: false
        type: boolean
        default: false
      editor_map:
        description: "Optional map to load (e.g., /Game/Maps/Example)"
        required: false
        type: string
        default: ""
      editor_args:
        description: "Extra args to pass to UnrealEditor (e.g., -log)"
        required: false
        type: string
        default: "-log"
      editor_detach:
        description: "Detach editor (do not block workflow)"
        required: false
        type: boolean
        default: true
      editor_project:
        description: "Project to open: 'host' (packaged HostProject) or 'sandbox' (ProjectSandbox in repo)"
        required: false
        type: string
        default: "host"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: unreal-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UE_ROOT: 'C:\\Program Files\\Epic Games\\UE_5.6'
  PLUGIN_NAME: 'Open3DStream'

jobs:
  changes:
    name: Detect non-doc changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Filter paths (docs vs code)
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            code:
              # Core C++ library and build system that affect the plugin
              - 'src/**'
              - 'thirdparty/**'
              - 'Build/**'
              - 'CMakeLists.txt'
              - 'package.py'
              - 'o3ds.fbs'
              - 'src/o3ds_generated.h'
              # Unreal plugin actual source and uplugin descriptor
              - 'plugins/unreal/Open3DStream/Source/**'
              - 'plugins/unreal/Open3DStream/*.uplugin'
              - '.github/workflows/unreal-plugin-ci.yml'

  build-and-test:
    needs: changes
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (needs.changes.outputs.code == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false))
    runs-on: [ self-hosted, ue5, windows ]

    steps:
      - name: Checkout (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Post build started comment
        if: github.event_name == 'pull_request' && github.event.pull_request.number != null
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Unreal Plugin CI build started** for this PR!\n\n[View build logs →](${runUrl})`
            });

      - name: Build plugin core (composite)
        id: core
        uses: ./.github/actions/build-plugin-core
        with:
          ue_root: ${{ env.UE_ROOT }}
          plugin_name: ${{ env.PLUGIN_NAME }}
          build_type: RelWithDebInfo
          enable_webrtc: true
          # libdatachannel_root removed - now uses downloaded release from fetch-ldc step

      - name: Build Open3DStream plugin (Win64)
        shell: powershell
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
          & .\Build\Scripts\Build-Plugin.ps1 `
            -UEPath "$env:UE_ROOT" `
            -PluginUPluginPath "${{ steps.core.outputs.uplugin_path }}" `
            -OutDir "$pkg" `
            -TargetPlatforms @("Win64")

      # Open3DBroadcast is now integrated as a module within Open3DStream plugin
      # No separate build step needed - it's built as part of Open3DStream

      - name: Package artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnrealPlugins-Win64-${{ github.sha }}
          path: ${{ runner.temp }}/PluginPackage
          retention-days: 30

      - name: Optionally launch Unreal Editor (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.open_editor == 'true' }}
        shell: powershell
        run: |
          $editor = Join-Path $Env:UE_ROOT "Engine\Binaries\Win64\UnrealEditor.exe"
          if (-not (Test-Path -LiteralPath $editor)) {
            throw "UnrealEditor.exe not found: $editor"
          }
          $projectChoice = "${{ github.event.inputs.editor_project }}".Trim().ToLowerInvariant()

          if ($projectChoice -eq "sandbox") {
            Write-Host "Selected project: ProjectSandbox"
            # Link the plugin into the sandbox so it loads when opening the project
            & .\Build\Scripts\Link-PluginIntoSandbox.ps1
            $uproject = Join-Path $Env:GITHUB_WORKSPACE 'ProjectSandbox\\ProjectSandbox.uproject'
            if (-not (Test-Path -LiteralPath $uproject)) {
              throw "Sandbox project not found: $uproject"
            }
          } else {
            Write-Host "Selected project: HostProject (packaged by BuildPlugin)"
            $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
            $uproject = Join-Path $pkg 'HostProject\\HostProject.uproject'
            if (-not (Test-Path -LiteralPath $uproject)) {
              throw "Host project not found: $uproject"
            }
          }

          $map   = "${{ github.event.inputs.editor_map }}".Trim()
          $extra = "${{ github.event.inputs.editor_args }}".Trim()

          $argList = @()
          $argList += '"' + $uproject + '"'
          if ($map  -ne "") { $argList += $map }
          if ($extra -ne "") { $argList += $extra }

          if ([System.Convert]::ToBoolean("${{ github.event.inputs.editor_detach }}")) {
            Write-Host "Starting Unreal Editor detached..."
            Start-Process -FilePath $editor -ArgumentList $argList | Out-Null
          } else {
            Write-Host "Starting Unreal Editor and waiting for exit..."
            & $editor @argList
          }

      - name: Post build completed comment
        if: github.event_name == 'pull_request' && github.event.pull_request.number != null && success()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Unreal Plugin CI build completed successfully!**\n\n[View build logs →](${runUrl})\n\n📦 Plugin artifacts (Open3DStream plugin) are available for download in the workflow run.`
            });

      - name: Post build failed comment
        if: github.event_name == 'pull_request' && github.event.pull_request.number != null && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Unreal Plugin CI build failed.**\n\n[View build logs →](${runUrl})\n\nPlease check the logs for details.`
            });
