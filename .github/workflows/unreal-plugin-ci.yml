name: Unreal Plugin CI

on:
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'plugins/unreal/**'
      - 'src/**'
      - '.github/workflows/unreal-plugin-ci.yml'
    types: [ opened, synchronize, ready_for_review ]
    paths-ignore:
      - '**/*.md'
      - '**/*.rst'
      - '**/*.txt'
      - 'docs/**'
      - 'sphinx/**'
      - 'plugins/unreal/**/docs/**'
  push:
    branches: [ develop, main ]
    paths:
      - 'plugins/unreal/**'
      - 'src/**'
      - '.github/workflows/unreal-plugin-ci.yml'
    paths-ignore:
      - '**/*.md'
      - '**/*.rst'
      - '**/*.txt'
      - 'docs/**'
      - 'sphinx/**'
      - 'plugins/unreal/**/docs/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: unreal-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UE_ROOT: 'C:\\Program Files\\Epic Games\\UE_5.6'
  PLUGIN_NAME: 'Open3DStream'

jobs:
  build-and-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: [ self-hosted, ue5, windows ]

    steps:
      - name: Checkout (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Post build started comment
        if: github.event_name == 'pull_request' && github.event.pull_request.number != null
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Unreal Plugin CI build started** for this PR!\n\n[View build logs →](${runUrl})`
            });

      - name: Build plugin core (composite)
        id: core
        uses: ./.github/actions/build-plugin-core
        with:
          ue_root: ${{ env.UE_ROOT }}
          plugin_name: ${{ env.PLUGIN_NAME }}
          build_type: RelWithDebInfo
          enable_webrtc: true
          libdatachannel_root: ${{ github.workspace }}\plugins\unreal\${{ env.PLUGIN_NAME }}\ThirdParty\webrtc

      - name: Build Open3DStream plugin (Win64)
        shell: powershell
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP 'PluginPackage'
          & .\Build\Scripts\Build-Plugin.ps1 `
            -UEPath "$env:UE_ROOT" `
            -PluginUPluginPath "${{ steps.core.outputs.uplugin_path }}" `
            -OutDir "$pkg" `
            -TargetPlatforms @("Win64")

      # Open3DBroadcast is now integrated as a module within Open3DStream plugin
      # No separate build step needed - it's built as part of Open3DStream

      - name: Package artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnrealPlugins-Win64-${{ github.sha }}
          path: ${{ runner.temp }}/PluginPackage
          retention-days: 30

      - name: Post build completed comment
        if: github.event_name == 'pull_request' && github.event.pull_request.number != null && success()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Unreal Plugin CI build completed successfully!**\n\n[View build logs →](${runUrl})\n\n📦 Plugin artifacts (Open3DStream plugin) are available for download in the workflow run.`
            });

      - name: Post build failed comment
        if: github.event_name == 'pull_request' && github.event.pull_request.number != null && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Unreal Plugin CI build failed.**\n\n[View build logs →](${runUrl})\n\nPlease check the logs for details.`
            });
