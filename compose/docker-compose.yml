version: "3.8"

services:
  repeater:
    image: ghcr.io/lifelike-and-believable/open3dstream-repeater:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.repeater
    environment:
      - LISTEN_ADDR=${LISTEN_ADDR:-tcp://0.0.0.0:7000}
      - BROADCAST_ADDR=${BROADCAST_ADDR:-tcp://0.0.0.0:7001}
    ports:
      - "7000:7000"
      - "7001:7001"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portainer:
    image: portainer/portainer-ce:latest
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  portainer_data:
