#cloud-config
package_update: true
packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

runcmd:
  # Install Docker
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # Create project directory and copy compose file
  - mkdir -p /opt/open3dstream
  - cat > /opt/open3dstream/docker-compose.yml << 'EOF'
version: "3.8"

services:
  repeater:
    image: ghcr.io/lifelike-and-believable/open3dstream-repeater:latest
    environment:
      - LISTEN_ADDR=${LISTEN_ADDR:-tcp://0.0.0.0:7000}
      - BROADCAST_ADDR=${BROADCAST_ADDR:-tcp://0.0.0.0:7001}
    ports:
      - "7000:7000"
      - "7001:7001"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  portainer_data:
EOF

  - cat > /opt/open3dstream/.env << 'EOF'
LISTEN_ADDR=tcp://0.0.0.0:7000
BROADCAST_ADDR=tcp://0.0.0.0:7001
EOF

  - chown -R ubuntu:ubuntu /opt/open3dstream || true
  - docker compose -f /opt/open3dstream/docker-compose.yml up -d

final_message: "Cloud-init finished: Open3DStream Repeater + Portainer should be running"
#cloud-config
package_update: true
package_upgrade: true

runcmd:
  # Install Docker on Ubuntu 22.04
  - |
    if ! command -v docker >/dev/null 2>&1; then
      apt-get update
      apt-get install -y ca-certificates curl gnupg
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      systemctl enable --now docker
    fi

  - mkdir -p /opt/repeater
  - chown ubuntu:ubuntu /opt/repeater || true

  - |
    cat >/opt/repeater/docker-compose.yml <<'EOF'
    version: "3.9"
    services:
      repeater:
        image: ghcr.io/lifelike-and-believable/open3dstream-repeater:latest
        container_name: o3ds-repeater
        restart: always
        environment:
          - LISTEN_ADDR=${LISTEN_ADDR:-tcp://0.0.0.0:7000}
          - BROADCAST_ADDR=${BROADCAST_ADDR:-tcp://0.0.0.0:7001}
        ports:
          - "7000:7000"
          - "7001:7001"
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"

      portainer:
        image: portainer/portainer-ce:latest
        container_name: portainer
        restart: always
        ports:
          - "9000:9000"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - portainer_data:/data

    volumes:
      portainer_data:
    EOF

  - |
    cat >/opt/repeater/.env <<'EOF'
    LISTEN_ADDR=tcp://0.0.0.0:7000
    BROADCAST_ADDR=tcp://0.0.0.0:7001
    EOF

  - docker compose -f /opt/repeater/docker-compose.yml --env-file /opt/repeater/.env up -d

final_message: |
  Repeater + Portainer deployed.
  Visit: http://<instance-public-ip>:9000 to finish Portainer setup.
  In your AWS Security Group, restrict 9000 to trusted IPs only.
